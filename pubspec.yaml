name: medsos
description: AI-powered medication management and emergency assistance.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.0.0

  # Fonts & UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.1.0
  lottie: ^3.3.1

  # Local Storage
  shared_preferences: ^2.5.3

  # Notifications
  flutter_local_notifications: ^19.4.0

  # Location
  geolocator: ^14.0.2

  # Voice
  speech_to_text: ^7.2.0
  flutter_tts: ^4.2.3

  # Permissions
  permission_handler: ^12.0.1

  # Internet
  connectivity_plus: ^7.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/